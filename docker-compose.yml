version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: vulnora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    # ... your existing volumes, env_file, etc.

  celery-worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      - redis
      - backend
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped

  # Optional: Monitoring UI
  flower:
    build: ./backend
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0

volumes:
  redis_data:
  backend:
    build: ./backend
    container_name: vulnora-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    networks:
      - vulnora-net

  frontend:
    build: ./frontend
    container_name: vulnora-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000
    volumes:
      - ./frontend:/app
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - vulnora-net

networks:
  vulnora-net:
    driver: bridge
