version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: vulnora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: vulnora-zap
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8090:8090"
    command: >
      zap.sh -daemon -port 8080 -host 0.0.0.0 
      -config api.addrs.*.allowed=.* 
      -config api.key= 
      -config proxy.port=8090 
      -config proxy.address=0.0.0.0
    networks:
      - vulnora-net

  backend:
    build: ./backend
    container_name: vulnora-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    networks:
      - vulnora-net
    depends_on:
      - redis
      - zap

  celery-worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      - redis
      - backend
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    networks:
      - vulnora-net

  frontend:
    build: ./frontend
    container_name: vulnora-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000
    volumes:
      - ./frontend:/app
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - vulnora-net

networks:
  vulnora-net:
    driver: bridge

volumes:
  redis_data:
