version: '3.9'

services:
  backend:
    build: ./backend
    container_name: vulnora-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    networks:
      - vulnora-net

  frontend:
    build: ./frontend
    container_name: vulnora-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000
    volumes:
      - ./frontend:/app
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - vulnora-net

networks:
  vulnora-net:
    driver: bridge
